<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 灵构</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="login-box">
        <h2 class="login-title">灵构 登录</h2>
        <form method="post">
            <div class="input-item">
                <input class="login-input" type="text" name="username" placeholder="请输入账号" value="admin">
            </div>
            <div class="input-item">
                <input class="login-input" type="password" name="password" placeholder="请输入密码" value="123456">
            </div>

            <div class="extra-row">
                <label class="remember-me">
                    <input type="checkbox" checked>
                    记住账号密码
                </label>
                <span class="forget-pwd" onclick="alert('忘记密码功能开发中，联系管理员重置')">忘记密码？</span>
            </div>

            <button class="login-btn-full" type="submit">立即登录</button>
        </form>

        <div class="register-tip">
            还没有账号？
            <a href="javascript:alert('注册功能开发中，敬请期待')">立即注册</a>
        </div>
    </div>
</body>
</html>
